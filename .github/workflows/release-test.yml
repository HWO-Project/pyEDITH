name: Publish to TestPyPI

on:
  release:
    types: [published]
  # Also allow manual triggering for testing
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test (e.g., v1.7.0)'
        required: true

jobs:
  validate-and-publish-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # VALIDATION STEP: Check version matches tag
      - name: Validate version matches tag
        run: |
          import tomllib
          import sys
          
          # Get tag name (remove 'v' prefix if present)
          tag = "${{ github.event.release.tag_name || github.event.inputs.tag }}"
          tag_version = tag.lstrip('v')
          
          # Read version from pyproject.toml
          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
          
          pyproject_version = pyproject["project"]["version"]
          
          print(f"Tag version: {tag_version}")
          print(f"pyproject.toml version: {pyproject_version}")
          
          if tag_version != pyproject_version:
              print(f"❌ VERSION MISMATCH!")
              print(f"   Tag '{tag}' does not match pyproject.toml version '{pyproject_version}'")
              sys.exit(1)
          else:
              print(f"✅ Versions match! Proceeding with publish to TestPyPI.")
        shell: python

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Publish to TestPyPI
        run: |
          twine upload dist/* --repository testpypi --username __token__ --password ${{ secrets.TESTPYPI_API_TOKEN }}